<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Verify OTP</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light d-flex align-items-center justify-content-center min-vh-100">
    <div class="card shadow-lg p-4" style="width: 400px; border-radius: 20px;">
        <h2 class="text-center mb-4">OTP Verification</h2>
        <form method="POST" action="/verify_otp">
            <div class="mb-3">
                <label class="form-label">Enter OTP</label>
                <input type="text" class="form-control" name="otp" required>
            </div>
            <button type="submit" class="btn btn-warning w-100">Verify OTP</button>
        </form>
    </div>
</body>
</html>
